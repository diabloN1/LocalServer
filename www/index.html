<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalServer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a; color: #e2e8f0; min-height: 100vh;
    }
    header {
      background: #1e293b; border-bottom: 1px solid #334155;
      padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem;
    }
    .logo { font-size: 1.4rem; font-weight: 700; color: #3b82f6; }
    .badge { background: #1d4ed8; color: white; font-size: 0.7rem;
             padding: 0.2rem 0.5rem; border-radius: 9999px; font-weight: 600; }
    main { max-width: 900px; margin: 3rem auto; padding: 0 2rem; }
    h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; }
    h1 span { color: #3b82f6; }
    .subtitle { color: #94a3b8; font-size: 1.1rem; margin-bottom: 3rem; }
    footer {
      text-align: center; color: #475569; font-size: 0.8rem;
      padding: 2rem; margin-top: 4rem; border-top: 1px solid #1e293b;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">LocalServer</div>
    <span class="badge">HTTP/1.1</span>
    <span class="badge">NIO</span>
    <span class="badge">Java</span>
  </header>

  <main>
    <h1>Welcome to <span>LocalServer</span></h1>
  </main>

  <footer>LocalServer/1.0 &mdash; Java NIO HTTP/1.1 &mdash; Running on port
    <span id="port"></span>
  </footer>

  <script>
    document.getElementById('port').textContent = window.location.port || '80';
  </script>
</body>
</html>
