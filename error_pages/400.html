<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Error 400</title>
    <style>
      /* Scandinavian Design Variables */
      :root {
        --bg-color: #f4f5f7;
        --surface-color: #ffffff;
        --text-main: #2e3440;
        --text-muted: #6c7a89;
        --accent-color: #5e81ac;
        --border-color: #e2e8f0;
        --radius: 12px;
        --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
          Helvetica, sans-serif;
        background: var(--bg-color);
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-font-smoothing: antialiased;
        padding: 1rem;
      }

      .c {
        background: var(--surface-color);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02),
          0 10px 15px rgba(0, 0, 0, 0.03);
        text-align: center;
        padding: 3.5rem 2rem;
        max-width: 420px;
        width: 100%;
      }

      .code {
        font-size: 7rem;
        font-weight: 800;
        color: var(--accent-color);
        line-height: 1;
        letter-spacing: -2px;
      }

      .d {
        width: 40px;
        height: 3px;
        background: var(--border-color);
        margin: 1.5rem auto;
        border-radius: 2px;
      }

      .t {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
        color: var(--text-main);
      }

      .m {
        color: var(--text-muted);
        font-size: 0.95rem;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 2.5rem;
        padding: 0.75rem 1.5rem;
        background: var(--bg-color);
        color: var(--text-main);
        text-decoration: none;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        font-size: 0.95rem;
        font-weight: 500;
        transition: var(--transition);
      }

      a:hover {
        background: var(--accent-color);
        color: white;
        border-color: var(--accent-color);
        transform: translateY(-1px);
      }
    </style>
  </head>
  <body>
    <div class="c">
      <div class="code">400</div>
      <div class="d"></div>
      <div class="t">Custom Error Page</div>
      <div class="m">
        This is a custom error page loaded from the error_pages directory.
      </div>
      <a href="/">← Home</a>
    </div>
  </body>
</html>
